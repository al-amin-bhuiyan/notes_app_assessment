name: notes_app_assessment
description: A clean Flutter notes app for assessment.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # State management & DI
  get: ^4.6.6

  # Navigation
  go_router: ^14.3.0

  # Local storage
  shared_preferences: ^2.2.3

  # UI packages
  awesome_dialog: ^3.3.0
  loading_animation_widget: ^1.3.0
  flutter_markdown: ^0.7.7+1

  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  toastification: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true